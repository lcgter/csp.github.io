<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ky package info</title>
    <style>
        :root {
            --primary-color: #3498db;
            --error-color: #e74c3c;
            --text-dark: #2c3e50;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dark);
        }

        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h1 {
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary-color);
        }

        .input-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
            font-size: 1rem;
        }

        input:focus {
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            margin-top: 0.5rem;
        }

        button:hover {
            background-color: #2980b9;
        }

        button:active {
            transform: scale(0.98);
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            display: none; /* Hidden by default */
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            position: relative;
            line-height: 1.6;
        }

        .modal-body {
            margin-bottom: 1.5rem;
            font-size: 1.05rem;
            text-align: left;
        }

        .close-btn {
            background: #eee;
            color: #333;
            width: auto;
            padding: 8px 25px;
            display: block;
            margin: 0 auto;
        }

        .close-btn:hover {
            background: #ddd;
        }

        /* New styles for copy button */
        .copy-btn {
            background-color: #2ecc71;
            margin-top: 15px;
            font-size: 0.9rem;
        }
        .copy-btn:hover {
            background-color: #27ae60;
        }
        .info-highlight {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 6px;
            border-left: 4px solid var(--primary-color);
            margin-top: 10px;
            font-size: 0.95rem;
        }

        .loading-spinner {
            display: none;
            margin-top: 10px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Package Query</h1>
        
        <div class="input-group">
            <label for="packageNumber">Package Number</label>
            <input type="text" id="packageNumber" placeholder="Enter pkg_no...">
        </div>

        <div class="input-group">
            <label for="skc">SKC</label>
            <input type="text" id="skc" placeholder="Enter goods_sn...">
        </div>

        <button id="searchBtn">Search</button>
        <div id="loading" class="loading-spinner">Querying database...</div>
    </div>

    <!-- Custom Modal -->
    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-content">
            <div id="modalBody" class="modal-body">
                <!-- Result lines will be injected here -->
            </div>
            <button class="close-btn" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script>
        const searchBtn = document.getElementById('searchBtn');
        const pkgInput = document.getElementById('packageNumber');
        const skcInput = document.getElementById('skc');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalBody = document.getElementById('modalBody');
        const loading = document.getElementById('loading');

        // Configuration
        const API_URL = 'https://jbmasixvsgwypughjhzk.supabase.co/rest/v1/csp_packages';
        const HEADERS = {
            'apikey': 'sb_publishable_40rCwoGI6jW2TfBjB7OoTA_E9X5nGex',
            'Authorization': 'Bearer sb_publishable_40rCwoGI6jW2TfBjB7OoTA_E9X5nGex',
            'Content-Type': 'application/json'
        };

        // Function to copy text to clipboard
        async function copyToClipboard(text, btnElement) {
            try {
                await navigator.clipboard.writeText(text);
                const originalText = btnElement.innerText;
                btnElement.innerText = "Copied!";
                btnElement.style.backgroundColor = "#27ae60";
                setTimeout(() => {
                    btnElement.innerText = originalText;
                    btnElement.style.backgroundColor = "";
                }, 2000);
            } catch (err) {
                alert("Failed to copy to clipboard.");
            }
        }

        async function performSearch() {
            const pkgValue = pkgInput.value.trim();
            const skcValue = skcInput.value.trim();

            if (!pkgValue || !skcValue) {
                alert("Please fill in both fields");
                return;
            }

            // Show loading state
            loading.style.display = 'block';
            searchBtn.disabled = true;

            try {
                const queryParams = `?pkg_no=eq.${encodeURIComponent(pkgValue)}&goods_sn=eq.${encodeURIComponent(skcValue)}`;
                
                const response = await fetch(`${API_URL}${queryParams}`, {
                    method: 'GET',
                    headers: HEADERS
                });

                if (!response.ok) throw new Error('Network response was not ok');

                const data = await response.json();
                
                if (data && data.length > 0) {
                    // Condition A: Row Found
                    const transferNo = data[0].origin_code || '';
                    const skcCode = data[0].goods_sn || '';
                    const copyText = `${transferNo}\t${skcCode}`;

                    showModal(`
                        Result: Checked for incorrect/missing shipment <br>
                        Classification of processing results: Product does not match <br>
                        <b>Reason for verification:</b> Quality control: Product does not match the website (<span style="color: #e74c3c; font-weight: bold;">RC mistake</span>)
                        <div class="info-highlight">
                            <strong>Transfer Number:</strong> ${transferNo} <br>
                            <strong>SKC:</strong> ${skcCode}
                        </div>
                        <button id="copyBtn" class="copy-btn">Copy Transfer # & SKC</button>
                    `);

                    // Attach event listener to the newly created copy button
                    document.getElementById('copyBtn').onclick = function() {
                        copyToClipboard(copyText, this);
                    };

                } else {
                    // Condition B: Row NOT Found
                    showModal(`
                        Result: Checked for incorrect/missing shipment <br>
                        Classification of processing results: Product does not match <br>
                        <b>Reason for verification:</b> <span style="color: #e74c3c; font-weight: bold;">Supplier</span> - Product does not match the website
                    `);
                }

            } catch (error) {
                console.error('Fetch error:', error);
                showModal(`<span style="color: red;">Error connecting to the database. Please check your connection or API configuration.</span>`);
            } finally {
                loading.style.display = 'none';
                searchBtn.disabled = false;
            }
        }

        function showModal(content) {
            modalBody.innerHTML = content;
            modalOverlay.classList.add('active');
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
        }

        // Event Listeners
        searchBtn.addEventListener('click', performSearch);

        [pkgInput, skcInput].forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    performSearch();
                }
            });
        });

        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });
    </script>
</body>
</html>
